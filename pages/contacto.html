<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pacifico&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Contacto - El Reino del Alfajor</title>
</head>
<body>
    <header class="header">
        <div class="header__imagen-logo">
            <img src="../multimedia/images/logo.png" class="header__logo" alt="logo del reino del alfajor">
            <h2 class="header__subtitulo">Lider en lo dulce</h2>
        </div>
        <nav class="header__nav">
            <ul class="header__enlaces">
                <li><a href="../index.html" class="header__link">Inicio</a></li>
                <li><a href="acerca-de.html" class="header__link">Acerca de</a></li>
                <li><a href="productos.html" class="header__link">Productos</a></li>
                <li><a href="resenas.html" class="header__link">Reseñas</a></li>
                <li><a href="contacto.html" class="header__link">Contacto</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="main">
        <section id="contacto">
            <form action="https://formspree.io/f/xjgjkjgq" method="POST">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="nombre" required placeholder="Nombre">

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="correo electronico" required placeholder="Correo electrónico">

                <label for="message">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="4" cols="50" required placeholder="Ingrese un mensaje"></textarea>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="footer__redes">
            <a href="https://www.facebook.com/" target="_blank"><img src="../multimedia/images/icons/icono-facebook.png" alt="Facebook" class="footer__icon"></a>
            <a href="https://www.instagram.com/" target="_blank"><img src="../multimedia/images/icons/icono-instagram.png" alt="Instagram" class="footer__icon"></a>
            <a href="https://wa.me/tu-numero-aqui" target="_blank"><img src="../multimedia/images/icons/icono-whatsapp.png" alt="WhatsApp" class="footer__icon"></a>
        </div>
        <p class="footer__parrafo">Contacto: <a href="mailto:hola@reinodelalfajor.com" class="footer__enlace">Envianos un mail</a></p>
        <address class="footer__address">Dirección: Av. SiempreViva 123, Buenos Aires</address>
        <p class="footer__parrafo footer__parrafo--uppercase">&copy; 2026 Reino Del Alfajor - Todos los derechos reservados</p>
    </footer>
</body>
</html>
